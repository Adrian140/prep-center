name: Sync Amazon Catalog Dimensions (ASIN dimensions)

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. 23:00 UTC = 00:00 CET (winter).
    - cron: '0 23 * * *'

concurrency:
  group: sync-amazon-catalog-dimensions
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (spapi-worker)
        working-directory: tools/spapi-worker
        run: npm ci

      - name: Run catalog dimensions sync
        id: run_sync
        working-directory: tools/spapi-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          SPAPI_LWA_CLIENT_ID: ${{ secrets.SPAPI_LWA_CLIENT_ID }}
          SPAPI_LWA_CLIENT_SECRET: ${{ secrets.SPAPI_LWA_CLIENT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SPAPI_ROLE_ARN: ${{ secrets.SPAPI_ROLE_ARN }}
          SPAPI_REGION: ${{ secrets.SPAPI_REGION || 'eu' }}
          SPAPI_REFRESH_TOKEN: ${{ secrets.SPAPI_REFRESH_TOKEN }}
          # Optional: set to a single marketplace ID for focused testing.
          SPAPI_CATALOG_DIM_MARKETPLACE_ID: ${{ secrets.SPAPI_CATALOG_DIM_MARKETPLACE_ID || '' }}
          # Default scope: DE, FR, IT, ES
          SPAPI_CATALOG_DIM_MARKETPLACE_IDS: ${{ secrets.SPAPI_CATALOG_DIM_MARKETPLACE_IDS || 'A1PA6795UKMFR9,A13V1IB3VIYZZH,APJ6JRA9NG5V4,A1RKKUPIHCS9HS' }}
          # 0 means unlimited in this script.
          SPAPI_CATALOG_DIM_MAX_INTEGRATIONS_PER_RUN: ${{ secrets.SPAPI_CATALOG_DIM_MAX_INTEGRATIONS_PER_RUN || '0' }}
          SPAPI_CATALOG_DIM_ASINS_PER_RUN: ${{ secrets.SPAPI_CATALOG_DIM_ASINS_PER_RUN || '0' }}
          # Stop gracefully around 5h and save checkpoint before the job hard timeout.
          SPAPI_CATALOG_DIM_MAX_RUNTIME_SECONDS: ${{ secrets.SPAPI_CATALOG_DIM_MAX_RUNTIME_SECONDS || '18000' }}
          SPAPI_CATALOG_DIM_RUNTIME_BUFFER_SECONDS: ${{ secrets.SPAPI_CATALOG_DIM_RUNTIME_BUFFER_SECONDS || '180' }}
        run: |
          set -o pipefail
          npm run sync-amazon-catalog-dimensions | tee sync-catalog-dimensions.log
          if grep -q "CATALOG_DIMENSIONS_CONTINUE=1" sync-catalog-dimensions.log; then
            echo "continue_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "continue_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger follow-up run when budget reached
        if: steps.run_sync.outputs.continue_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/workflows/sync-amazon-catalog-dimensions.yml/dispatches" \
            -d "{\"ref\":\"$REF\"}"
