name: Sync PrepBusiness Inbounds

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: sync-prepbusiness-inbounds
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase prepbusiness-sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE:-}" ]; then
            echo "Missing secrets: SUPABASE_URL and/or SUPABASE_SERVICE_ROLE"
            exit 1
          fi

          ENDPOINT="${SUPABASE_URL%/}/functions/v1/prepbusiness-sync"
          echo "Calling $ENDPOINT"

          TMP_BODY="$(mktemp)"
          HTTP_CODE=$(curl -sS -o "$TMP_BODY" -w "%{http_code}" \
            -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_SERVICE_ROLE" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE" \
            --data '{}')

          echo "HTTP $HTTP_CODE"
          cat "$TMP_BODY"
          echo

          node - "$TMP_BODY" <<'NODE'
          const fs = require('fs');
          const path = process.argv[2];
          const raw = fs.readFileSync(path, 'utf8');
          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch (error) {
            console.error('Could not parse JSON response:', error.message);
            process.exit(0);
          }

          const results = Array.isArray(parsed?.results) ? parsed.results : [];
          const freshResults = results.filter((entry) => !entry?.idempotent);
          if (!freshResults.length) {
            console.log('PrepBusiness product summary: 0 new products imported.');
            process.exit(0);
          }

          console.log('PrepBusiness product summary:');
          for (const entry of freshResults) {
            const sourceId = entry?.source_id ?? 'unknown';
            const state = entry?.error ? 'ERROR' : entry?.idempotent ? 'IDEMPOTENT' : 'IMPORTED';
            console.log(`- inbound ${sourceId} [${state}]`);
            const products = Array.isArray(entry?.products) ? entry.products : [];
            if (!products.length) {
              console.log('  products: none');
              continue;
            }
            for (const product of products) {
              const asin = String(product?.asin || '—').trim() || '—';
              const sku = String(product?.sku || '—').trim() || '—';
              console.log(`  ASIN=${asin} | SKU=${sku}`);
            }
          }
          NODE

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "prepbusiness-sync failed"
            exit 1
          fi
